[pytest]
# Pytest configuration for OpenDomains

# Directories to search for tests
testpaths = tests

# Python files pattern
python_files = test_*.py

# Python classes pattern
python_classes = Test*

# Python functions pattern
python_functions = test_*

# Ignore __pycache__ directories
norecursedirs = __pycache__ .git .pytest_cache .mypy_cache

# Markers configuration
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (module interactions)
    slow: Slow tests (external APIs, should be skipped by default)

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options (when coverage is installed)
# addopts = -v --cov=src --cov-report=html --cov-report=term

# Timeout for tests (requires pytest-timeout)
# timeout = 10

# Asyncio mode (requires pytest-asyncio)
asyncio_mode = auto
